version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
      POSTGRES_DB: authdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d authdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: ":8080"
      DATABASE_URL: "postgres://authuser:authpass@db:5432/authdb?sslmode=disable"
      JWT_SECRET: "change-me-to-a-real-secret-at-least-32-bytes!!"
      DEVICE_FINGERPRINT_SALT: "change-me-device-salt"
      BCRYPT_COST: "12"
      MIGRATIONS_PATH: "/app/migrations"
      STORAGE_PATH: "/app/storage"
    volumes:
      - filestorage:/app/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  filestorage:
